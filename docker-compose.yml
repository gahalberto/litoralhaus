services:
  postgres:
    image: postgres:16-alpine
    container_name: litoralhaus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: litoralhaus
      POSTGRES_PASSWORD: litoralhaus
      POSTGRES_DB: litoralhaus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litoralhaus"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
